# Generated by Wallust
format = """
[]({{color5}})\
$username\
[](bg:{{color4}} fg:{{color5}})\
$directory\
[](bg:{{color3}} fg:{{color4}})\
$git_branch\
$git_status\
[](bg:{{color2}} fg:{{color3}})\
$time\
[](fg:{{color2}})\
$character"""

[username]
show_always = true
style_user = "bg:{{color5}} fg:{{background}}"
style_root = "bg:{{color5}} fg:{{background}}"
format = '[$user ]($style)'

[directory]
style = "bg:{{color4}} fg:{{background}}"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bg:{{color3}} fg:{{background}}"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:{{color3}} fg:{{background}}"
format = '[$all_status$ahead_behind ]($style)'

[time]
disabled = false
time_format = "%H:%M"
style = "bg:{{color2}} fg:{{background}}"
format = '[  $time ]($style)'

[character]
success_symbol = '[ ❯](bold {{color2}})'
error_symbol = '[ ❯](bold {{color1}})'
